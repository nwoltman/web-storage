name: Test

on:
  push:
  pull_request:
  workflow_call:

env:
  FORCE_COLOR: 2

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
