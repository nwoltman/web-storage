name: Test

on:
  workflow_call:

env:
  FORCE_COLOR: 2

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - run: npm install
      - run: npm run typecheck
      - run: npm test
